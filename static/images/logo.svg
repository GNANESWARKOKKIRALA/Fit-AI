<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="grad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0.6"/>
    </linearGradient>
  </defs>
  <!-- Outer activity ring -->
  <circle cx="20" cy="20" r="17" fill="none" stroke="url(#grad)" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="85 22"/>
  <!-- Inner ring accent -->
  <circle cx="20" cy="20" r="12.5" fill="none" stroke="url(#grad2)" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="20 18 12 18"/>
  <!-- Dumbbell bar -->
  <rect x="10" y="18.5" width="20" height="3" rx="1.5" fill="url(#grad)"/>
  <!-- Dumbbell left weight -->
  <rect x="8" y="15" width="5" height="10" rx="2" fill="url(#grad)"/>
  <!-- Dumbbell right weight -->
  <rect x="27" y="15" width="5" height="10" rx="2" fill="url(#grad)"/>
  <!-- AI circuit nodes -->
  <circle cx="20" cy="8" r="2" fill="#06B6D4"/>
  <circle cx="32" cy="14" r="1.5" fill="#7C3AED" opacity="0.8"/>
  <circle cx="8" cy="14" r="1.5" fill="#06B6D4" opacity="0.8"/>
  <circle cx="32" cy="28" r="1.5" fill="#06B6D4" opacity="0.7"/>
  <circle cx="8" cy="28" r="1.5" fill="#7C3AED" opacity="0.7"/>
  <!-- Circuit connection lines -->
  <line x1="20" y1="10" x2="20" y2="15" stroke="#06B6D4" stroke-width="0.8" opacity="0.5"/>
  <line x1="30.5" y1="15" x2="27" y2="17" stroke="#7C3AED" stroke-width="0.8" opacity="0.4"/>
  <line x1="9.5" y1="15" x2="13" y2="17" stroke="#06B6D4" stroke-width="0.8" opacity="0.4"/>
</svg>
